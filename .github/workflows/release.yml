name: Release build

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build signed release APK
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: bash

    env:
      ANDROID_COMPILE_SDK: "35"
      ANDROID_BUILD_TOOLS: "35.0.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Install Android SDK packages
        run: |
          set -euo pipefail

          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$SDK_ROOT" ]; then
            echo "ANDROID_HOME / ANDROID_SDK_ROOT is not set" >&2
            exit 1
          fi

          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found: $SDKMANAGER" >&2
            exit 1
          fi

          yes 2>/dev/null | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail

          missing=0

          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing GitHub secret: ANDROID_KEYSTORE_BASE64" >&2
            missing=1
          fi

          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "Missing GitHub secret: ANDROID_KEYSTORE_PASSWORD" >&2
            missing=1
          fi

          if [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "Missing GitHub secret: ANDROID_KEY_ALIAS" >&2
            missing=1
          fi

          exit "$missing"

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build unsigned release APK
        run: ./gradlew :app:assembleRelease

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/release.jks"

      - name: Sign release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          BUILD_TOOLS="$ANDROID_HOME/build-tools/${ANDROID_BUILD_TOOLS}"
          ZIPALIGN="$BUILD_TOOLS/zipalign"
          APKSIGNER="$BUILD_TOOLS/apksigner"

          VERSION_NAME=$(awk -F'"' '/versionName[[:space:]]*=/{print $2; exit}' app/build.gradle.kts)
          if [ -z "$VERSION_NAME" ]; then
            echo "Could not read versionName from app/build.gradle.kts" >&2
            exit 1
          fi

          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*-release-unsigned.apk" | head -n 1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "Unsigned release APK not found" >&2
            find app/build/outputs/apk/release -type f >&2 || true
            exit 1
          fi

          mkdir -p release

          ALIGNED_APK="release/savings-calendar-${VERSION_NAME}-aligned.apk"
          SIGNED_APK="release/savings-calendar-${VERSION_NAME}.apk"

          "$ZIPALIGN" -P 16 -f -v 4 "$UNSIGNED_APK" "$ALIGNED_APK"

          KEY_PASSWORD_ARG=()
          if [ -n "${ANDROID_KEY_PASSWORD:-}" ]; then
            KEY_PASSWORD_ARG=(--key-pass env:ANDROID_KEY_PASSWORD)
          fi

          "$APKSIGNER" sign \
            --ks "$RUNNER_TEMP/signing/release.jks" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            "${KEY_PASSWORD_ARG[@]}" \
            --v4-signing-enabled false \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          "$APKSIGNER" verify --verbose --print-certs "$SIGNED_APK"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: savings-calendar-release-apk
          if-no-files-found: error
          retention-days: 14
          path: |
            release/savings-calendar-*.apk
            !release/savings-calendar-*-aligned.apk

      - name: Upload ProGuard mapping
        uses: actions/upload-artifact@v4
        with:
          name: savings-calendar-release-mapping
          if-no-files-found: warn
          retention-days: 14
          path: app/build/outputs/mapping/release/mapping.txt