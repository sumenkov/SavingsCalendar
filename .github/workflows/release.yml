name: Release build

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.1"

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build unsigned release APK
        run: ./gradlew :app:assembleRelease

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/release.jks"

      - name: Sign release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.1"
          VERSION_NAME=$(grep -m1 'versionName' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          KEY_PASSWORD_ARG=()
          if [ -n "$ANDROID_KEY_PASSWORD" ]; then
            KEY_PASSWORD_ARG=(--key-pass "pass:$ANDROID_KEY_PASSWORD")
          fi

          mkdir -p release
          "$BUILD_TOOLS/zipalign" -p -f 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            "release/savings-calendar-${VERSION_NAME}-aligned.apk"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$RUNNER_TEMP/signing/release.jks" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            "${KEY_PASSWORD_ARG[@]}" \
            --out "release/savings-calendar-${VERSION_NAME}.apk" \
            "release/savings-calendar-${VERSION_NAME}-aligned.apk"
          "$BUILD_TOOLS/apksigner" verify --verbose "release/savings-calendar-${VERSION_NAME}.apk"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: savings-calendar-release-apk
          path: |
            release/savings-calendar-*.apk
            !release/savings-calendar-*-aligned.apk
