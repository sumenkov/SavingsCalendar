name: Secret smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -e

          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is empty"
            exit 1
          fi

          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "ANDROID_KEYSTORE_PASSWORD is empty"
            exit 1
          fi

          if [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "ANDROID_KEY_ALIAS is empty"
            exit 1
          fi

          echo "Keystore base64 length: ${#ANDROID_KEYSTORE_BASE64}"
          echo "Alias: [$ANDROID_KEY_ALIAS]"

          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/release.jks"

          echo "Decoded keystore file:"
          ls -lh "$RUNNER_TEMP/signing/release.jks"

          echo "Decoded keystore sha256:"
          sha256sum "$RUNNER_TEMP/signing/release.jks"

          keytool -list -v \
            -keystore "$RUNNER_TEMP/signing/release.jks" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" | tee "$RUNNER_TEMP/keyinfo.txt"

          grep -q "PrivateKeyEntry" "$RUNNER_TEMP/keyinfo.txt"
          grep -q "Certificate chain length: 1" "$RUNNER_TEMP/keyinfo.txt"